name: backup

# Backup semanal do Postgres, criptografado (gpg simetrico AES256) e publicado
# como artifact do repositorio (retencao 90 dias).
#
# Secrets necessarios (Settings > Secrets and variables > Actions):
#   SUPABASE_DB_URL    -> connection string do Postgres. Use a string do painel
#                         (Settings > Database > Connection string > URI). Prefira
#                         a "Session pooler" (IPv4) porque o runner do GitHub e IPv4.
#   BACKUP_PASSPHRASE  -> senha do gpg simetrico (guardar no gerenciador de senhas).
#
# Restaurar:
#   gpg --batch --passphrase 'SENHA' --decrypt backup-XXXX.sql.gpg > dump.sql
#   psql "$SUPABASE_DB_URL" < dump.sql
# Fazer um teste de restore (num projeto descartavel) ANTES do beta: backup que
# nunca foi restaurado nao e backup.

on:
  schedule:
    - cron: '0 5 * * 0' # domingo, 05:00 UTC
  workflow_dispatch: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: pg_dump + gpg
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${DB_URL:-}" ] || [ -z "${PASSPHRASE:-}" ]; then
            echo 'Erro: configure os secrets SUPABASE_DB_URL e BACKUP_PASSPHRASE'
            echo '(repo > Settings > Secrets and variables > Actions).'
            exit 1
          fi
          stamp=$(date -u +%Y%m%d-%H%M%S)
          # pg_dump 17 via docker: roda contra servidores 15+ sem mismatch de versao
          docker run --rm -i postgres:17-alpine \
            pg_dump "$DB_URL" --no-owner --no-privileges > "backup-$stamp.sql"
          gpg --batch --yes --passphrase "$PASSPHRASE" --symmetric --cipher-algo AES256 \
            -o "backup-$stamp.sql.gpg" "backup-$stamp.sql"
          rm -f "backup-$stamp.sql"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: '*.sql.gpg'
          retention-days: 90
          if-no-files-found: error

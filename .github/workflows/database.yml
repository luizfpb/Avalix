name: database

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - '.github/workflows/database.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: database-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Inicia Supabase local e aplica todas as migrations
        run: |
          npx supabase start
          npx supabase db reset --local
      - name: Testes pgTAP
        run: npx supabase test db
      - name: Encerra Supabase local
        if: always()
        run: npx supabase stop --no-backup
